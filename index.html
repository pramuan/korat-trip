<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทริปเขาใหญ่ - โคราช</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #5b7444; --bg: #f8f9fa; --txt: #333; }
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        
        /* Banner Section */
        .banner { 
            width: 100%; height: 200px; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1510672854261-2679634e749a?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .itinerary { padding: 20px; }
        .day-label { font-weight: 600; color: var(--p); font-size: 1.1rem; margin: 20px 0 10px; border-left: 4px solid var(--p); padding-left: 10px; }
        
        .card { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; transition: 0.2s;
        }
        .card.checked { background: #f0f7eb; opacity: 0.6; }
        .card.checked .name { text-decoration: line-through; color: #999; }

        .check-box { width: 22px; height: 22px; cursor: pointer; accent-color: var(--p); }
        .info { flex: 1; }
        .time { font-size: 0.8rem; color: #d4a373; font-weight: 600; }
        .name { font-size: 1rem; color: var(--txt); text-decoration: none; display: block; }
        
        /* รูปภาพประกอบ */
        .pic { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; background: #eee; }
        
        footer { text-align: center; padding: 30px; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="banner">
        <h1 style="margin:0">Khao Yai Trip</h1>
        <p>25 - 26 เมษายน 2569</p>
    </div>

    <div class="itinerary">
        <div class="day-label">วันเสาร์ที่ 25 เมษายน</div>

        <div class="card" data-id="1">
            <input type="checkbox" class="check-box">
            <div class="info">
                <span class="time">11.00 น.</span>
                <a href="https://www.google.com/maps/search/MAT+%26+co+Khaoyai" target="_blank" class="name">MAT & co / Sai Sook</a>
            </div>
            <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=200" class="pic">
        </div>

        <div class="card" data-id="2">
            <input type="checkbox" class="check-box">
            <div class="info">
                <span class="time">13.00 น.</span>
                <a href="https://www.google.com/maps/search/วัดโนนกุ่ม" target="_blank" class="name">วัดโนนกุ่ม</a>
            </div>
            <img src="https://images.unsplash.com/photo-1528127269322-539801943592?w=200" class="pic">
        </div>

        <div class="day-label">วันอาทิตย์ที่ 26 เมษายน</div>

        <div class="card" data-id="3">
            <input type="checkbox" class="check-box">
            <div class="info">
                <span class="time">10.30 น.</span>
                <a href="https://www.google.com/maps/search/ไร่สุวรรณ" target="_blank" class="name">ไร่สุวรรณ</a>
            </div>
            <img src="https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=200" class="pic">
        </div>
    </div>

    <footer>
        <p>บันทึกการเดินทางของคุณใน LocalStorage</p>
        <button onclick="localStorage.clear(); location.reload();" style="border:1px solid #ddd; background:none; color:#999; border-radius:15px; padding:5px 10px; cursor:pointer;">ล้างข้อมูลทั้งหมด</button>
    </footer>
</div>

<script>
    // ระบบบันทึกสถานะ
    const boxes = document.querySelectorAll('.check-box');
    const KEY = 'TRIP_PROG_2026';

    function save() {
        const checked = Array.from(boxes).filter(i => i.checked).map(i => i.closest('.card').dataset.id);
        localStorage.setItem(KEY, JSON.stringify(checked));
    }

    boxes.forEach(cb => {
        cb.addEventListener('change', (e) => {
            e.target.closest('.card').classList.toggle('checked', e.target.checked);
            save();
        });
    });

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem(KEY) || '[]');
        saved.forEach(id => {
            const card = document.querySelector(`[data-id="${id}"]`);
            if (card) {
                card.querySelector('input').checked = true;
                card.classList.add('checked');
            }
        });
    }
</script>
</body>
</html>
